[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
ignored_error_codes = [6546]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
goat_testnet = "${GOAT_RPC_URL}"

[etherscan]
goat_testnet = { key = "", url = "https://explorer.testnet3.goat.network/api" }
